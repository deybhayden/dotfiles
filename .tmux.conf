set -g mouse on
set -g extended-keys on
set -g status-keys vi
setw -g mode-keys vi
set -sg escape-time 10

# Copy mode: use v/V to start a selection and y/Y to yank it, like vi.
set -g set-clipboard on
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel
bind-key -T copy-mode-vi Y send -X copy-selection-and-cancel

# Enable truecolor so tmux can use the Pi-inspired hex colors below.
set -as terminal-features ',*:RGB'

# Pi-inspired subtle status bar. Defaults to the light theme.
# Uses a slightly shaded background like Pi tool-call blocks.
# Swap themes inside tmux with: prefix + L for light, prefix + D for dark.
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-left " #S "
set -g status-right " %H:%M %d-%b-%y "
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "

# Light theme, based on Pi's light tool-call block/footer colors.
set -g @pi_tmux_theme light
set -g status-style "bg=#e8e8f0,fg=#6c6c6c"
set -g status-left-style "bg=#e8e8f0,fg=#5a8080,bold"
set -g status-right-style "bg=#e8e8f0,fg=#767676"
set -g window-status-style "bg=#e8e8f0,fg=#767676"
set -g window-status-current-style "bg=#d0d0e0,fg=#875f87,bold"
setw -g mode-style "bg=#e8e8f0,fg=#6c6c6c"
# Use 256-color values for messages; some tmux/terminal combinations ignore hex here.
set -g message-style "bg=colour254,fg=colour66,bold"
set -g message-command-style "bg=colour254,fg=colour96,bold"

# Theme switchers.
bind-key L set -g @pi_tmux_theme light \; \
	set -g status-style "bg=#e8e8f0,fg=#6c6c6c" \; \
	set -g status-left-style "bg=#e8e8f0,fg=#5a8080,bold" \; \
	set -g status-right-style "bg=#e8e8f0,fg=#767676" \; \
	set -g window-status-style "bg=#e8e8f0,fg=#767676" \; \
	set -g window-status-current-style "bg=#d0d0e0,fg=#875f87,bold" \; \
	setw -g mode-style "bg=#e8e8f0,fg=#6c6c6c" \; \
	set -g message-style "bg=colour254,fg=colour66,bold" \; \
	set -g message-command-style "bg=colour254,fg=colour96,bold" \; \
	display-message "theme: light"

bind-key D set -g @pi_tmux_theme dark \; \
	set -g status-style "bg=#282832,fg=#808080" \; \
	set -g status-left-style "bg=#282832,fg=#8abeb7,bold" \; \
	set -g status-right-style "bg=#282832,fg=#666666" \; \
	set -g window-status-style "bg=#282832,fg=#666666" \; \
	set -g window-status-current-style "bg=#3a3a4a,fg=#b294bb,bold" \; \
	setw -g mode-style "bg=#282832,fg=#c0c0c0" \; \
	set -g message-style "bg=colour236,fg=colour109,bold" \; \
	set -g message-command-style "bg=colour236,fg=colour139,bold" \; \
	display-message "theme: dark"